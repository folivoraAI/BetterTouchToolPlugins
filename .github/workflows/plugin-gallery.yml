name: Publish Plugin Gallery

on:
  push:
    branches:
      - master
    paths:
      - "plugins/**"
      - "site/**"
      - "tools/build-site-catalog.mjs"
      - ".github/workflows/plugin-gallery.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build plugin catalog
        run: node tools/build-site-catalog.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload gallery artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
